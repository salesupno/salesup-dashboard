<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesUp — CEO Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app/styles.css" />
  <style>
    /* keep selection subtle */
    ::selection { background: var(--green-bg); }

    /* editable liquidity cells */
    .liq-cell { width: 100%; border: none; outline: none; background: transparent;
      font-family: var(--font); font-size: 13px; text-align: right; padding: 10px 16px;
      color: var(--ink); transition: background .12s ease; }
    .liq-cell:hover { background: var(--hairline-2); }
    .liq-cell:focus { background: #F2F9E4; box-shadow: inset 0 0 0 1.5px var(--c-deep); border-radius: 6px; }
    .liq-cell::placeholder { color: var(--ink-3); }

    .liq-name { border: none; outline: none; background: transparent; font-family: var(--font);
      font-size: 13px; color: var(--ink); width: 100%; padding: 10px 2px; font-weight: 500; }
    .liq-name:focus { color: var(--ink); }
    .liq-name::placeholder { color: var(--ink-3); font-style: italic; }

    .liq-del { border: none; background: none; cursor: pointer; color: var(--hairline);
      display: grid; place-items: center; padding: 2px; border-radius: 5px; flex: none;
      opacity: 0; transition: opacity .14s ease, color .14s ease; }
    .liq-row:hover .liq-del { opacity: 1; color: var(--ink-3); }
    .liq-del:hover { color: var(--red); background: var(--red-soft); }

    .liq-mini { width: 22px; height: 22px; border-radius: 7px; border: 1px solid var(--hairline);
      background: var(--surface); color: var(--ink-2); cursor: pointer; font-size: 15px; line-height: 1;
      display: grid; place-items: center; font-family: var(--font); }
    .liq-mini:hover { background: var(--cream); color: var(--ink); }

    .cust-row { transition: background .14s ease; }
    .cust-row:hover { background: var(--hairline-2); }

    .cust-mail { width: 30px; height: 30px; border-radius: 9px; border: 1px solid var(--hairline);
      background: var(--surface); color: var(--ink-2); cursor: pointer; display: grid; place-items: center;
      transition: all .15s ease; }
    .cust-mail:hover { background: var(--green-bg); color: var(--ink); border-color: var(--c-mid); }

    .edit-num { border: none; outline: none; background: transparent; font-family: var(--font);
      text-align: center; border-radius: 6px; padding: 1px 2px; transition: background .12s ease; cursor: text; }
    .edit-num:hover { background: var(--hairline-2); }
    .edit-num:focus { background: #F2F9E4; box-shadow: inset 0 0 0 1.5px var(--c-deep); }
    .edit-num.dark:hover { background: rgba(255,255,255,.08); }
    .edit-num.dark:focus { background: rgba(232,245,208,.12); box-shadow: inset 0 0 0 1.5px var(--c-mid); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="app/data.js"></script>
  <script type="text/babel" src="app/components.jsx"></script>
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/liquidity.jsx"></script>
  <script type="text/babel" src="app/tabs1.jsx"></script>
  <script type="text/babel" src="app/tabs2.jsx"></script>
  <script type="text/babel" src="app/customers.jsx"></script>
  <script type="text/babel" src="app/capacity.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
